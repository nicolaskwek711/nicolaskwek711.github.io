<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street - Nicolas Kwek</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #fff;
            color: #000;
            overflow-x: hidden;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 4rem;
        }

        nav .container,
        footer .container { max-width: 1600px; }

        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 1.5rem 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img { height: 50px; transition: transform 0.3s; }
        .logo:hover img { transform: scale(1.05); }

        .nav-actions { display: flex; gap: 0.75rem; align-items: center; }

        .back-btn {
            position: relative;
            padding: 0.75rem 1.6rem;
            background: rgba(255,255,255,0.05);
            color: #000;
            text-decoration: none;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: lowercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(6px) url(#liquid-glass);
            -webkit-backdrop-filter: blur(6px);
            box-shadow:
                0 0 6px rgba(0,0,0,0.03),
                0 2px 6px rgba(0,0,0,0.08),
                inset 3px 3px 0.5px -3px rgba(0,0,0,0.9),
                inset -3px -3px 0.5px -3px rgba(0,0,0,0.85),
                inset 1px 1px 1px -0.5px rgba(0,0,0,0.6),
                inset -1px -1px 1px -0.5px rgba(0,0,0,0.6),
                inset 0 0 6px 6px rgba(0,0,0,0.12),
                inset 0 0 2px 2px rgba(0,0,0,0.06),
                0 0 12px rgba(255,255,255,0.15);
            transition: transform 0.3s ease;
        }
        .back-btn:hover { transform: scale(1.05); }

        .hero {
            padding: 10rem 0 3rem;
        }

        .section-label {
            font-size: 0.75rem;
            color: #999;
            text-transform: lowercase;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        .section-title {
            font-size: clamp(4rem, 11vw, 9rem);
            font-weight: 900;
            line-height: 0.9;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            text-transform: lowercase;
        }

        .section-desc {
            font-size: 1.1rem;
            color: #666;
            max-width: 560px;
        }

        .meta-row {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #999;
            text-transform: lowercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .meta-row span strong { color: #000; margin-right: 0.5rem; }

        .grid {
            padding-bottom: 6rem;
        }

        .grid-row {
            display: flex;
            gap: 1.25rem;
            margin-bottom: 1.25rem;
        }

        .grid-item {
            cursor: zoom-in;
            position: relative;
            overflow: hidden;
            border-radius: 6px;
            background: #f3f3f3;
            flex: 0 0 auto;
        }

        .grid-item img {
            display: block;
            width: 100%;
            height: 100%;
            transition: transform 0.6s ease, opacity 0.4s ease;
            opacity: 0;
        }
        .grid-item img.loaded { opacity: 1; }
        .grid-item:hover img { transform: scale(1.04); }

        .grid-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.25) 100%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .grid-item:hover::after { opacity: 1; }

        .lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            cursor: zoom-out;
        }
        .lightbox.open { display: flex; }

        .lightbox img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .lightbox-close,
        .lightbox-prev,
        .lightbox-next {
            position: absolute;
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: background 0.2s;
        }
        .lightbox-close:hover,
        .lightbox-prev:hover,
        .lightbox-next:hover { background: rgba(255,255,255,0.2); }

        .lightbox-close { top: 1.5rem; right: 1.5rem; }
        .lightbox-prev { left: 1.5rem; top: 50%; transform: translateY(-50%); }
        .lightbox-next { right: 1.5rem; top: 50%; transform: translateY(-50%); }

        .lightbox-counter {
            position: absolute;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: lowercase;
        }

        footer {
            padding: 4rem 0 3rem;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .footer-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-title {
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            font-weight: 900;
            line-height: 1;
            text-transform: lowercase;
            letter-spacing: -0.03em;
        }

        .footer-text { color: #999; font-size: 0.9rem; }

        @media (max-width: 520px) {
            .nav-actions { gap: 0.4rem; }
            .back-btn { padding: 0.6rem 1rem; font-size: 0.78rem; letter-spacing: 0.5px; }
            nav { padding: 1rem 0; }
            .logo img { height: 36px; }
        }

        @media (max-width: 640px) {
            .container { padding: 0 1.5rem; }
            .hero { padding: 7rem 0 2rem; }
            .grid { gap: 1rem; }
            .grid-col { gap: 1rem; }
            .meta-row { flex-direction: column; gap: 0.75rem; }
            .footer-content { flex-direction: column; gap: 1.5rem; text-align: center; }
            .lightbox { padding: 1rem; }
            .lightbox-close { top: 0.75rem; right: 0.75rem; }
            .lightbox-prev { left: 0.5rem; }
            .lightbox-next { right: 0.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/NK Black Logo (No BG).png" alt="NK">
            </a>
            <div class="nav-actions">
                <a href="portfolio.html" class="back-btn secondary">← portfolio</a>
                <a href="index.html" class="back-btn">← home</a>
            </div>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <div class="section-label">candid moments</div>
            <h1 class="section-title">street photography</h1>
            <p class="section-desc">people, light, and small accidents of timing — frames pulled from walks through cities i love.</p>
            <div class="meta-row">
                <span><strong>tap</strong>any image to enlarge</span>
            </div>
        </div>
    </section>

    <div class="container">
        <div class="grid" id="grid"></div>
        <noscript style="color:#999;">enable javascript to view the gallery</noscript>
    </div>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lb-close" aria-label="Close">×</button>
        <button class="lightbox-prev" id="lb-prev" aria-label="Previous">‹</button>
        <img id="lb-img" alt="">
        <button class="lightbox-next" id="lb-next" aria-label="Next">›</button>
        <div class="lightbox-counter" id="lb-counter"></div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-content">
                <div class="footer-title">always creating.</div>
                <div class="footer-text">&copy; 2024 Nicolas Kwek · Singapore 🇸🇬</div>
            </div>
        </div>
    </footer>

    <script>
        const total = 18;
        const images = Array.from({ length: total }, (_, i) =>
            `images/Street Photography/Image ${i + 1}.jpg`
        );

        const grid = document.getElementById('grid');
        const GAP = 20;            // px, must match CSS gap
        const TARGET_HEIGHT = 320; // baseline row height

        function preload(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => resolve({ src, w: img.naturalWidth, h: img.naturalHeight });
                img.onerror = () => resolve({ src, w: 4, h: 3 });
                img.src = src;
            });
        }

        let dims = [];

        function layout() {
            if (!dims.length) return;
            const containerWidth = grid.clientWidth;
            grid.innerHTML = '';

            // Greedy fill: keep adding to row until adding another would push the
            // scaled height below 0.7 * TARGET; otherwise close the row.
            const rows = [];
            let row = [];
            let aspectSum = 0;

            const idealWidthForRow = (aSum, count) =>
                (containerWidth - GAP * (count - 1)) / aSum;

            dims.forEach((d, i) => {
                const aspect = d.w / d.h;
                row.push({ ...d, idx: i, aspect });
                aspectSum += aspect;

                const projectedHeight = idealWidthForRow(aspectSum, row.length);
                if (projectedHeight <= TARGET_HEIGHT) {
                    rows.push({ items: row, scaledHeight: projectedHeight });
                    row = [];
                    aspectSum = 0;
                }
            });

            // Last partial row: justify to the same target if there's leftover
            if (row.length) {
                const projectedHeight = idealWidthForRow(aspectSum, row.length);
                rows.push({ items: row, scaledHeight: Math.min(projectedHeight, TARGET_HEIGHT) });
            }

            rows.forEach((r) => {
                const rowEl = document.createElement('div');
                rowEl.className = 'grid-row';
                rowEl.style.height = `${r.scaledHeight}px`;

                r.items.forEach((it) => {
                    const item = document.createElement('div');
                    item.className = 'grid-item';
                    item.style.width = `${it.aspect * r.scaledHeight}px`;

                    const img = document.createElement('img');
                    img.src = it.src;
                    img.alt = `Street photograph ${it.idx + 1}`;
                    img.loading = 'lazy';
                    img.addEventListener('load', () => img.classList.add('loaded'));
                    item.appendChild(img);
                    item.addEventListener('click', () => openLightbox(it.idx));
                    rowEl.appendChild(item);
                });

                grid.appendChild(rowEl);
            });
        }

        Promise.all(images.map(preload)).then((results) => {
            dims = results;
            layout();
        });

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(layout, 150);
        });

        const lb = document.getElementById('lightbox');
        const lbImg = document.getElementById('lb-img');
        const lbCounter = document.getElementById('lb-counter');
        let currentIndex = 0;

        function openLightbox(i) {
            currentIndex = i;
            lbImg.src = images[i];
            lbCounter.textContent = `${i + 1} / ${total}`;
            lb.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lb.classList.remove('open');
            document.body.style.overflow = '';
        }

        function navigate(dir) {
            currentIndex = (currentIndex + dir + total) % total;
            lbImg.src = images[currentIndex];
            lbCounter.textContent = `${currentIndex + 1} / ${total}`;
        }

        document.getElementById('lb-close').addEventListener('click', (e) => { e.stopPropagation(); closeLightbox(); });
        document.getElementById('lb-prev').addEventListener('click',  (e) => { e.stopPropagation(); navigate(-1); });
        document.getElementById('lb-next').addEventListener('click',  (e) => { e.stopPropagation(); navigate(1); });
        lb.addEventListener('click', closeLightbox);

        let touchStartX = 0;
        lb.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
        });

        document.addEventListener('keydown', (e) => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigate(-1);
            if (e.key === 'ArrowRight') navigate(1);
        });
    </script>
    <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
        <defs>
            <filter id="liquid-glass" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
                <feTurbulence type="fractalNoise" baseFrequency="0.05 0.05" numOctaves="1" seed="1" result="turbulence"/>
                <feGaussianBlur in="turbulence" stdDeviation="2" result="blurredNoise"/>
                <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="70" xChannelSelector="R" yChannelSelector="B" result="displaced"/>
                <feGaussianBlur in="displaced" stdDeviation="4" result="finalBlur"/>
                <feComposite in="finalBlur" in2="finalBlur" operator="over"/>
            </filter>
        </defs>
    </svg>
</body>
</html>
